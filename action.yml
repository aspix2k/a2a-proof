name: A2A Proof Contracts
description: Run black-box behavior contracts against a deployed A2A agent
author: Alexey Larionov

branding:
  icon: check-circle
  color: purple

inputs:
  config:
    description: Path to the a2a-proof contract
    required: false
    default: a2a-proof.yaml

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: false
        python-version: "3.11"
        version: "0.11.29"
    - name: Run A2A contracts
      shell: bash
      env:
        A2A_PROOF_CONFIG: ${{ inputs.config }}
      run: >-
        uv run --project "$GITHUB_ACTION_PATH" --frozen --no-dev
        a2a-proof run -- "$A2A_PROOF_CONFIG"
