name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          python-version: "3.11"
      - run: uv sync --frozen --all-groups
      - name: Match package version to tag
        run: |
          version=$(uv run --frozen python -c 'import importlib.metadata; print(importlib.metadata.version("a2a-proof"))')
          test "$GITHUB_REF_NAME" = "v$version"
      - run: uv run --frozen pytest
      - run: uv build
      - run: uv run --frozen twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
      - name: Write checksums
        working-directory: dist
        run: sha256sum *.whl *.tar.gz > SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-distributions
          path: dist/
          if-no-files-found: error

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/a2a-proof/
    permissions:
      id-token: write # Required for PyPI Trusted Publishing.
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  publish:
    name: Prepare GitHub release
    needs: [build, pypi]
    runs-on: ubuntu-latest
    permissions:
      attestations: write # Required to store signed build provenance.
      contents: write # Required to create the GitHub release.
      id-token: write # Required to sign build provenance through OIDC.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: dist/
      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/*
      - name: Read release notes from changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $1 == "##" && $2 == version { found = 1; next }
            found && $1 == "##" { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          awk '
            /^### / {
              if ($0 !~ /^### (Features|Bug fixes|Security|Documentation|Maintenance)$/ ||
                  (section && !entry)) exit 1
              section = 1
              entry = 0
              next
            }
            section && /^- / { entry = 1 }
            END { if (!section || !entry) exit 1 }
          ' release-notes.md
      - name: Create draft GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --notes-file release-notes.md
          --title "$GITHUB_REF_NAME"
          --draft
          --verify-tag
          --fail-on-no-commits
