name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials or responses from private agents.
  - type: input
    id: version
    attributes:
      label: a2a-proof version
      placeholder: Output of a2a-proof --version
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: Output of python --version
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include a minimal redacted configuration and the command you ran.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
